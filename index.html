<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f8f8f7; --bg3: #f1efe8;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --blue: #185FA5; --teal: #0F6E56; --amber: #854F0B;
    --purple: #534AB7; --red: #A32D2D; --gray: #5F5E5A;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 500; }
  header span { font-size: 12px; color: var(--text3); }
  .badge { font-size: 10px; background: #e8f5e9; color: #2e7d32; border-radius: 4px; padding: 2px 6px; margin-left: 4px; }
  .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; height: calc(100vh - 93px); }
  .pane { display: flex; flex-direction: column; overflow: hidden; }
  .pane-header { padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .pane-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); font-weight: 500; }
  .pane-actions { display: flex; gap: 6px; }
  .btn { padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 12px; cursor: pointer; background: var(--bg); color: var(--text); font-weight: 500; white-space: nowrap; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: .85; background: var(--text); }
  textarea { flex: 1; resize: none; border: none; outline: none; padding: 16px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.65; background: var(--bg); color: var(--text); border-right: 0.5px solid var(--border); }
  .preview-pane { flex: 1; overflow-y: auto; padding: 40px 56px; background: var(--bg); }
  .preview-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 13px; }
  .preview-doc { font-family: 'Times New Roman', Georgia, serif; max-width: 680px; margin: 0 auto; color: #111; line-height: 1.8; }
  .preview-doc-title { font-size: 18pt; font-weight: 600; text-align: center; margin-bottom: 2rem; }
  .sec-label { font-size: 11pt; font-weight: bold; text-transform: uppercase; letter-spacing: .06em; padding-left: 10px; margin: 1.4rem 0 .5rem; line-height: 1.4; border-left-width: 3px; border-left-style: solid; }
  .eq-display { text-align: center; margin: .9rem 0; overflow-x: auto; padding: 4px 0; }
  .plain-line { font-size: 11pt; line-height: 1.75; margin: .25rem 0; font-family: 'Times New Roman', Georgia, serif; }
  .divider { border: none; border-top: 0.5px solid #ccc; margin: 1rem 0; }
  .title-row { padding: 8px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 8px; }
  .title-row label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .title-row input { flex: 1; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; }
  .title-row input:focus { border-color: var(--blue); }
  .export-bar { padding: 10px 16px; border-top: 0.5px solid var(--border); background: var(--bg2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .status { font-size: 11px; color: var(--text3); margin-left: auto; }
  @media print {
    header, .pane:first-child, .pane-header, .title-row, .export-bar { display: none !important; }
    .main { display: block; height: auto; }
    .preview-pane { padding: 0; overflow: visible; }
    body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
    .sec-label { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    mjx-container svg * { fill: currentColor !important; }
  }
</style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <rect x="2" y="2" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.2"/>
    <path d="M6 7h8M6 10h5M6 13h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
  <span>Paste → Preview → Export to .docx / PDF / HTML <span class="badge">✓ Native editable equations in Word</span></span>
</header>

<div class="title-row">
  <label>Document title:</label>
  <input type="text" id="docTitle" value="Adham Zarif" placeholder="e.g. Fourier Series — Problem Set 3">
</div>

<div class="main">
  <!-- LEFT: input pane -->
  <div class="pane">
    <div class="pane-header">
      <span class="pane-label">Input</span>
      <div class="pane-actions">
        <button class="btn" onclick="loadExample()">Load example</button>
        <button class="btn" onclick="clearAll()">Clear</button>
        <button class="btn btn-primary" onclick="renderPreview()">Preview ↵</button>
      </div>
    </div>
    <textarea id="input" placeholder="Paste your reply here…

Format:
*Section Name*
[equation on one or multiple lines]
--- (divider)
plain text lines
**bold**, *italic* inline"></textarea>
  </div>

  <!-- RIGHT: preview pane -->
  <div class="pane">
    <div class="pane-header">
      <span class="pane-label">Preview</span>
      <div class="pane-actions">
        <button class="btn" onclick="exportHTML()" title="Download HTML">HTML</button>
        <button class="btn" onclick="exportDOCX()" title="Download editable .docx">DOCX</button>
        <button class="btn" onclick="exportPDF()" title="Save as PDF via print">PDF</button>
      </div>
    </div>
    <div class="preview-pane" id="preview">
      <div class="preview-empty">Paste your reply and click Preview</div>
    </div>
    <div class="export-bar">
      <button class="btn btn-primary" onclick="exportDOCX()">⬇ Download .docx</button>
      <button class="btn" onclick="exportHTML()">⬇ HTML (Word-ready)</button>
      <button class="btn" onclick="exportPDF()">🖨 Save as PDF</button>
      <span class="status" id="status"></span>
    </div>
  </div>
</div>

<script>
const EXAMPLE = `*Question*
Draw magnitude and phase plots of (c_k).

---

*Given*
[
c_0=1,\\quad
c_{\\pm1}=\\frac{1}{2}\\mp j,\\quad
c_{\\pm2}=-\\frac{1}{4}\\mp j\\frac{\\sqrt{3}}{4}
]

---

*Formulas*
[
|c_k|=\\sqrt{(\\Re c_k)^2+(\\Im c_k)^2}
]
[
\\angle c_k=\\tan^{-1}\\!\\left(\\frac{\\Im c_k}{\\Re c_k}\\right)
]

---

*Solution*

[
|c_0|=1,\\quad \\angle c_0=0
]

[
|c_1|=\\sqrt{\\left(\\frac{1}{2}\\right)^2+(-1)^2}
=\\sqrt{\\frac{1}{4}+1}
=\\frac{\\sqrt{5}}{2}
]

[
\\angle c_1=\\tan^{-1}\\!\\left(\\frac{-1}{1/2}\\right)
=-\\tan^{-1}(2)
]

[
|c_{-1}|=\\frac{\\sqrt{5}}{2},\\quad
\\angle c_{-1}=\\tan^{-1}(2)
]

[
|c_2|=\\sqrt{\\left(\\frac{1}{4}\\right)^2+\\left(\\frac{\\sqrt{3}}{4}\\right)^2}
=\\sqrt{\\frac{1}{16}+\\frac{3}{16}}
=\\frac{1}{2}
]

[
\\angle c_2=\\tan^{-1}\\!\\left(\\frac{-\\sqrt{3}/4}{-1/4}\\right)
=\\tan^{-1}(\\sqrt{3})=\\frac{\\pi}{3}
]

[
\\text{Quadrant III} \\Rightarrow \\angle c_2=-\\frac{2\\pi}{3}
]

[
|c_{-2}|=\\frac{1}{2},\\quad
\\angle c_{-2}=\\frac{2\\pi}{3}
]

---

*Final Answer*

*Magnitude plot points*
[
(-2,\\tfrac{1}{2}),\\ (-1,\\tfrac{\\sqrt{5}}{2}),\\ (0,1),\\ (1,\\tfrac{\\sqrt{5}}{2}),\\ (2,\\tfrac{1}{2})
]

*Phase plot points*
[
(-2,\\tfrac{2\\pi}{3}),\\ (-1,\\tan^{-1}(2)),\\ (0,0),\\ (1,-\\tan^{-1}(2)),\\ (2,-\\tfrac{2\\pi}{3})
]`;

const SEC_COLORS = {
  question:'#185FA5', given:'#0F6E56', formula:'#854F0B',
  solution:'#534AB7', 'final answer':'#A32D2D', answer:'#A32D2D',
  note:'#884488', default:'#5F5E5A'
};

function getSectionColor(name) {
  const k = name.toLowerCase();
  for (const key in SEC_COLORS) if (k.includes(key)) return SEC_COLORS[key];
  return SEC_COLORS.default;
}

// ── Unicode math renderer output → tool format ───────────────────────────────
// Handles copy-pasted output from AI chat / mobile math renderers where equations
// appear as stacked Unicode lines (numerators/denominators on separate lines,
// subscripts inline, etc.) rather than LaTeX.

const UNICODE_TO_LATEX_CHAR = {
  'α':'\\alpha','β':'\\beta','γ':'\\gamma','δ':'\\delta','ε':'\\epsilon',
  'θ':'\\theta','λ':'\\lambda','μ':'\\mu','π':'\\pi','σ':'\\sigma',
  'τ':'\\tau','φ':'\\phi','ω':'\\omega','Ω':'\\Omega','Σ':'\\Sigma',
  '∞':'\\infty','∂':'\\partial','∇':'\\nabla',
  '≤':'\\leq','≥':'\\geq','≠':'\\neq','≈':'\\approx','≡':'\\equiv',
  '∈':'\\in','∉':'\\notin','∪':'\\cup','∩':'\\cap',
  '⇒':'\\Rightarrow','⇔':'\\Leftrightarrow','→':'\\rightarrow',
  '±':'\\pm','∓':'\\mp','×':'\\times','÷':'\\div','·':'\\cdot',
  '∫':'\\int','∑':'\\sum','∏':'\\prod',
  '√':'\\sqrt','∠':'\\angle','∥':'\\parallel',
};

function unicodeCharToLatex(str) {
  let out = '';
  for (const ch of str) {
    out += UNICODE_TO_LATEX_CHAR[ch] !== undefined
      ? UNICODE_TO_LATEX_CHAR[ch] + ' '
      : ch;
  }
  return out.trim();
}

// Detect if a line looks like a math expression (contains operators, Greek, fractions)
function looksLikeMath(line) {
  const t = line.trim();
  if (!t) return false;
  return /[=+\-*/αβγδεθλμπσφωΩΣ∞∂≤≥≠≈±×∫∑∏√⇒→]/.test(t) ||
         /^\d+$/.test(t) ||   // lone numeral (numerator/denominator)
         /^[A-Za-z]\s*$/.test(t); // single letter (could be part of fraction)
}

// Convert a block of lines that form a stacked Unicode equation into LaTeX
// Handles the common pattern: line above fraction bar, then fraction-like content
function convertUnicodeEquationBlock(lines) {
  // Simple reassembly: join multi-line stacked math into a single flat expression
  // by detecting numerator / denominator patterns (a lone number above a lone number)
  const joined = lines.join(' ').replace(/\s+/g, ' ').trim();
  return unicodeCharToLatex(joined);
}

// Detect section headers: short lines that are all caps, or end with known keywords,
// or are followed by math content
function looksLikeSectionHeader(line) {
  const t = line.trim();
  if (!t || t.length > 80) return false;
  if (/^[👉🔴🟢✅❌⚠️💡🔑📌]+\s/.test(t)) return false; // emoji bullets → text
  // Capitalized title-case short lines with no math chars
  if (t.length < 60 && /^[A-Z]/.test(t) && !/[=+\-*/αβγδωΩ∫∑]/.test(t) &&
      !/^\d/.test(t) && (t.split(' ').length <= 8)) return true;
  return false;
}

function preprocessInput(raw) {
  // Strip zero-width chars
  raw = raw.replace(/[\u200b\u200c\u200d\uFEFF]/g, '');

  // Convert ### headings to *Section* format
  raw = raw.replace(/^#{1,6}\s+(.+)$/gm, (_, title) => `*${title.trim()}*`);

  // Convert *Label:* (with colon inside asterisks) to *Label* for section detection
  raw = raw.replace(/^\*([^*]+?):\*\s*$/gm, (_, label) => `*${label.trim()}*`);

  // Convert *Question N: Title* style headers  
  raw = raw.replace(/^\*(Question\s+\d+[^*]*)\*\s*$/gm, (_, label) => `*${label.trim()}*`);

  // Convert $$...$$ display math (possibly multiline) to [...] block format
  raw = raw.replace(/\$\$([\s\S]*?)\$\$/g, (_, latex) => `[\n${latex.trim()}\n]`);

  // Convert $...$ inline math to \(...\) format
  raw = raw.replace(/\$([^$\n]+?)\$/g, (_, latex) => `\\(${latex.trim()}\\)`);

  // If input already uses [LaTeX], \[LaTeX\], or \(...\) format, pass through with minimal cleanup
  if (/\[[\s\S]*?\\[a-zA-Z{]/.test(raw) || /\[[\s\S]{3,}?\]/.test(raw) ||
      /\\\[[\s\S]*?\\\]/.test(raw) || /\\\([\s\S]*?\\\)/.test(raw)) {
    return raw;
  }

  // Otherwise treat as Unicode-rendered math output (copy-paste from AI chat)
  const lines = raw.split('\n');
  const out = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    if (!trimmed) { i++; continue; }

    // Horizontal rules
    if (/^[-─═]{3,}$/.test(trimmed)) { out.push('---'); i++; continue; }

    // Emoji-prefixed lines → plain text
    if (/^[👉🔴🟢✅❌⚠️💡🔑📌]/.test(trimmed)) {
      out.push(trimmed.replace(/^[👉🔴🟢✅❌⚠️💡🔑📌]+\s*/, ''));
      i++; continue;
    }

    // Detect stacked fraction blocks: a short math line, then a lone number/letter,
    // then another math line — collapse them
    // Heuristic: if this line and next 1-2 lines are all short and math-like,
    // group them as one equation block
    const mathBlock = [];
    let j = i;
    while (j < lines.length && j < i + 6) {
      const t = lines[j].trim();
      if (!t) break;
      if (looksLikeMath(t)) { mathBlock.push(t); j++; }
      else break;
    }

    if (mathBlock.length >= 2) {
      // Multi-line math block: reassemble as LaTeX equation
      const latex = convertUnicodeEquationBlock(mathBlock);
      out.push('[');
      out.push(latex);
      out.push(']');
      i = j;
      continue;
    }

    // Single line that contains math mixed with text
    if (looksLikeMath(trimmed) && trimmed.length < 60 &&
        !/^[A-Z][a-z]/.test(trimmed)) {
      const latex = unicodeCharToLatex(trimmed);
      out.push('[' + latex + ']');
      i++; continue;
    }

    // Section header detection
    if (looksLikeSectionHeader(trimmed)) {
      out.push('*' + trimmed + '*');
      i++; continue;
    }

    // Plain text
    out.push(trimmed);
    i++;
  }

  return out.join('\n');
}


function tokenize(text) {
  const lines = text.split('\n');
  const tokens = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();
    if (/^---+/.test(trimmed)) { tokens.push({type:'hr'}); i++; continue; }
    const secMatch = trimmed.match(/^\*([^*]+)\*\s*:?\s*$/);
    if (secMatch) { tokens.push({type:'section', text:secMatch[1].trim()}); i++; continue; }

    // Handle \[...\] display math (possibly spanning multiple lines)
    if (trimmed.startsWith('\\[')) {
      let eq = trimmed.slice(2);
      if (eq.endsWith('\\]')) { eq = eq.slice(0, -2).trim(); }
      else {
        i++;
        while (i < lines.length && !lines[i].includes('\\]')) { eq += '\n' + lines[i]; i++; }
        if (i < lines.length) eq += '\n' + lines[i].slice(0, lines[i].lastIndexOf('\\]'));
      }
      tokens.push({type:'eq', latex:eq.trim()}); i++; continue;
    }

    // Handle [LaTeX] block format (possibly spanning multiple lines)
    // The block ends at a line that is JUST "]" (possibly with whitespace),
    // not a ] that is part of the equation like \right] or ]_{...}
    if (trimmed.startsWith('[') && !trimmed.startsWith('[Content')) {
      let eq = trimmed.slice(1);
      // Check if it closes on the same line
      if (eq.endsWith(']') && !eq.slice(0,-1).includes('[')) {
        eq = eq.slice(0,-1).trim();
      } else if (!eq.endsWith(']')) {
        // Multi-line: collect until a line that is ONLY "]"
        i++;
        while (i < lines.length) {
          const tl = lines[i].trim();
          if (tl === ']') { break; } // standalone closing bracket
          eq += '\n' + lines[i];
          i++;
        }
        // i now points at the closing ']' line (or past end)
      }
      tokens.push({type:'eq', latex:eq.trim()}); i++; continue;
    }

    if (trimmed) {
      let html = trimmed
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        // inline \(...\) math
        .replace(/\\\((.+?)\\\)/g, (_, e) => `\\(${e}\\)`)
        // inline [LaTeX] shorthand
        .replace(/\[([^\]]+)\]/g, (_, e) => `\\(${e}\\)`);
      tokens.push({type:'text', html});
    }
    i++;
  }
  return tokens;
}

// Fix LaTeX for MathJax preview: balance \left/\right pairs,
// and ensure every \left has a matching \right and vice versa.
function sanitizeLatexForPreview(latex) {
  // Count \left and \right occurrences
  const lefts = (latex.match(/\\left\s*(?:[([|{\\]|\\[a-zA-Z]+)/g) || []).length;
  const rights = (latex.match(/\\right\s*(?:[)\]|{}\\]|\\[a-zA-Z]+)/g) || []).length;
  if (lefts === rights) return latex; // already balanced

  // If unbalanced, strip ALL \left and \right — MathJax renders fine without them
  return latex.replace(/\\(left|right)\s*/g, '');
}

function renderTokens(tokens) {
  let html = '';
  for (const tok of tokens) {
    if (tok.type === 'hr') {
      html += '<hr class="divider">';
    } else if (tok.type === 'section') {
      const color = getSectionColor(tok.text);
      // Render inline \(...\) math inside section labels
      const labelHtml = tok.text.replace(/\\\((.+?)\\\)/g, (_, e) => `\\(${e}\\)`);
      html += `<div class="sec-label" style="color:${color};border-left-color:${color}">${labelHtml}</div>`;
    } else if (tok.type === 'eq') {
      const latex = sanitizeLatexForPreview(tok.latex);
      // store original latex as data attr for DOCX export to read
      const safe = tok.latex.replace(/"/g, '&quot;');
      html += `<div class="eq-display" data-latex="${safe}">\\[${latex}\\]</div>`;
    } else if (tok.type === 'text') {
      html += `<div class="plain-line">${tok.html}</div>`;
    }
  }
  return html;
}

async function renderPreview() {
  const raw = preprocessInput(document.getElementById('input').value.trim());
  const preview = document.getElementById('preview');
  if (!raw) { preview.innerHTML = '<div class="preview-empty">Nothing to render yet</div>'; return; }
  const tokens = tokenize(raw);
  const title = document.getElementById('docTitle').value || '';
  const titleHtml = title ? `<div style="font-size:18pt;font-weight:600;text-align:center;margin-bottom:2rem;font-family:'Times New Roman',Georgia,serif">${escHTML(title)}</div>` : '';
  preview.innerHTML = `<div style="font-family:'Times New Roman',Georgia,serif;max-width:680px;margin:0 auto;color:#111;line-height:1.8">${titleHtml}${renderTokens(tokens)}</div>`;
  if (window.MathJax) await MathJax.typesetPromise([preview]);
  setStatus('Rendered — ready to export');
}

function buildExportHTML() {
  const title = document.getElementById('docTitle').value || 'Document';
  const raw = document.getElementById('input').value.trim();
  const tokens = tokenize(preprocessInput(raw));
  let body = '';
  for (const tok of tokens) {
    if (tok.type === 'hr') {
      body += '<hr style="border:none;border-top:0.5px solid #ccc;margin:1rem 0">';
    } else if (tok.type === 'section') {
      const color = getSectionColor(tok.text);
      const labelHtml = tok.text.replace(/\\\((.+?)\\\)/g, (_, e) => `\\(${e}\\)`);
      body += `<div style="font-size:11pt;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;color:${color};border-left:3px solid ${color};padding-left:10px;margin:1.4rem 0 .5rem;line-height:1.4">${labelHtml}</div>`;
    } else if (tok.type === 'eq') {
      body += `<div style="text-align:center;margin:.9rem 0">\\[${tok.latex}\\]</div>`;
    } else if (tok.type === 'text') {
      body += `<p style="font-size:11pt;line-height:1.75;margin:.25rem 0">${tok.html}</p>`;
    }
  }
  const titleHtml = title ? `<h1 style="font-size:18pt;font-weight:600;text-align:center;margin-bottom:2rem">${escHTML(title)}</h1>` : '';
  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>${escHTML(title)}</title><script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.js"><\/script><style>body{font-family:'Times New Roman',Georgia,serif;max-width:720px;margin:60px auto;padding:0 56px;color:#111;line-height:1.8;}mjx-container svg{color:inherit;}@media print{body{margin:0;padding:40px;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}mjx-container svg *{fill:currentColor !important;}div[style*="color:"]{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style></head><body>${titleHtml}${body}</body></html>`;
}

function escHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportHTML() {
  const html = buildExportHTML();
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  const fname = (document.getElementById('docTitle').value||'document').replace(/\s+/g,'_').replace(/[^\w-]/g,'');
  a.download = fname + '.html'; a.click(); URL.revokeObjectURL(url);
  setStatus('Downloaded! Open the .html file in Microsoft Word.');
}

function exportPDF() {
  const title = document.getElementById('docTitle').value || 'Document';
  const raw = document.getElementById('input').value.trim();
  const tokens = tokenize(preprocessInput(raw));
  let body = '';
  for (const tok of tokens) {
    if (tok.type === 'hr') {
      body += '<hr style="border:none;border-top:0.5px solid #ccc;margin:1rem 0">';
    } else if (tok.type === 'section') {
      const color = getSectionColor(tok.text);
      const labelHtml = tok.text.replace(/\\\((.+?)\\\)/g, (_, e) => `\\(${e}\\)`);
      body += `<div style="font-size:11pt;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;color:${color};border-left:3px solid ${color};padding-left:10px;margin:1.4rem 0 .5rem;line-height:1.4;-webkit-print-color-adjust:exact;print-color-adjust:exact;">${labelHtml}</div>`;
    } else if (tok.type === 'eq') {
      body += `<div style="text-align:center;margin:.9rem 0;color:#111;">\\[${tok.latex}\\]</div>`;
    } else if (tok.type === 'text') {
      body += `<p style="font-size:11pt;line-height:1.75;margin:.25rem 0">${tok.html}</p>`;
    }
  }
  const titleHtml = title ? `<h1 style="font-size:18pt;font-weight:600;text-align:center;margin-bottom:2rem">${escHTML(title)}</h1>` : '';

  const w = window.open('', '_blank');
  if (!w) { setStatus('Allow pop-ups in your browser first.'); return; }

  // We write a self-contained page that:
  // 1. Loads MathJax with SVG renderer using font=mathjax-modern (lighter weight)
  // 2. Waits for MathJax to finish via its promise
  // 3. After typesetting, patches every SVG fill to #111 (not pure black, matches preview)
  // 4. Then triggers print
  const pdfHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${escHTML(title)}</title>
<style>
  body {
    font-family: 'Times New Roman', Georgia, serif;
    max-width: 720px;
    margin: 60px auto;
    padding: 0 56px;
    color: #1a1a18;
    line-height: 1.8;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }
  /* CHTML math inherits color from body — no SVG fill issues */
  mjx-container { color: #1a1a18 !important; }
  mjx-container * { color: #1a1a18 !important; border-color: #1a1a18 !important; }
  @media print {
    body { margin: 0; padding: 40px; color: #1a1a18; }
    mjx-container { color: #1a1a18 !important; }
    mjx-container * { color: #1a1a18 !important; border-color: #1a1a18 !important; }
  }
</style>
<script>
  window.MathJax = {
    chtml: { scale: 1, matchFontHeight: true },
    startup: {
      ready() {
        MathJax.startup.defaultReady();
        MathJax.startup.promise.then(() => {
          // Force all CHTML math elements to use exact preview color
          document.querySelectorAll('mjx-container, mjx-container *').forEach(el => {
            el.style.color = '#1a1a18';
          });
          setTimeout(() => { window.focus(); window.print(); }, 400);
        });
      }
    }
  };
<\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.js"><\/script>
</head>
<body>
${titleHtml}
${body}
</body>
</html>`;

  w.document.open();
  w.document.write(pdfHtml);
  w.document.close();
  setStatus('Waiting for render, then print dialog will open…');
}

function loadExample() { document.getElementById('input').value = EXAMPLE; renderPreview(); }
function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('preview').innerHTML = '<div class="preview-empty">Paste your reply and click Preview</div>';
  setStatus('');
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function escXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

async function ensureJSZip() {
  if (window.JSZip) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── LaTeX → OMML (Office Math Markup Language) converter ─────────────────────
// Converts a LaTeX string into native Word math XML (fully editable in Word).
const M = 'xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"';

function latexToOmml(latex) {
  // Tokenize and parse LaTeX into OMML XML string
  try {
    const omml = parseLatexExpr(latex.trim());
    return `<m:oMath ${M}>${omml}</m:oMath>`;
  } catch(e) {
    // Fallback: render as plain text run if parsing fails
    return `<m:oMath ${M}><m:r><m:t>${escXml(latex)}</m:t></m:r></m:oMath>`;
  }
}

// ── Core parser ───────────────────────────────────────────────────────────────
function parseLatexExpr(s) {
  // Handle multiple lines (multi-line equations joined with \\ or newlines)
  // Split on \\ or newlines → each line becomes a separate row in m:eqArr if multiple
  const lines = s.split(/\\\\|\n/).map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length > 1) {
    const rows = lines.map(l => `<m:e>${parseLatexLine(l)}</m:e>`).join('');
    return `<m:eqArr><m:eqArrPr><m:baseJc m:val="center"/></m:eqArrPr>${rows}</m:eqArr>`;
  }
  return parseLatexLine(s.trim());
}

function parseLatexLine(s) {
  // Split on \quad, \qquad, spacing commands → sequence of elements
  const parts = splitTopLevel(s);
  return parts.map(p => parseSingleExpr(p.trim())).join('');
}

function splitTopLevel(s) {
  // Split on top-level commas and spacing to get sequence of math atoms
  // We don't split on commas inside braces
  const result = [];
  let depth = 0, cur = '', i = 0;
  while (i < s.length) {
    const ch = s[i];
    if (ch === '{') { depth++; cur += ch; i++; }
    else if (ch === '}') { depth--; cur += ch; i++; }
    else if (depth === 0 && s.slice(i).match(/^\\(?:quad|qquad|,|;|:|!|\s)/)) {
      if (cur.trim()) result.push(cur.trim());
      // skip the spacing command
      const m = s.slice(i).match(/^\\(?:quad|qquad|,|;|:|!|\s)/);
      i += m[0].length; cur = '';
    } else {
      cur += ch; i++;
    }
  }
  if (cur.trim()) result.push(cur.trim());
  return result.length ? result : [s];
}

function parseSingleExpr(s) {
  if (!s) return '';
  // Handle sequences (implicit multiplication / juxtaposition)
  // We parse token by token
  const tokens = tokenizeLatex(s);
  return buildOmml(tokens);
}

// ── Tokenizer ─────────────────────────────────────────────────────────────────
function tokenizeLatex(s) {
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    // Skip whitespace
    if (/\s/.test(s[i])) { i++; continue; }
    // LaTeX command
    if (s[i] === '\\') {
      let cmd = '\\';
      i++;
      if (i < s.length && /[a-zA-Z]/.test(s[i])) {
        while (i < s.length && /[a-zA-Z]/.test(s[i])) { cmd += s[i]; i++; }
        // skip trailing space after command
        if (i < s.length && s[i] === ' ') i++;
      } else if (i < s.length) {
        cmd += s[i]; i++;
      }
      tokens.push({type:'cmd', val:cmd});
    }
    // Braced group
    else if (s[i] === '{') {
      const end = matchBrace(s, i);
      tokens.push({type:'group', val:s.slice(i+1, end)});
      i = end + 1;
    }
    // Superscript / subscript
    else if (s[i] === '^' || s[i] === '_') {
      tokens.push({type:'script', val:s[i]}); i++;
    }
    // Single char
    else {
      tokens.push({type:'char', val:s[i]}); i++;
    }
  }
  return tokens;
}

function matchBrace(s, start) {
  let depth = 0, i = start;
  while (i < s.length) {
    if (s[i] === '{') depth++;
    else if (s[i] === '}') { depth--; if (depth === 0) return i; }
    i++;
  }
  return s.length - 1;
}

// ── OMML builder ─────────────────────────────────────────────────────────────
function buildOmml(tokens) {
  let out = '';
  let i = 0;
  while (i < tokens.length) {
    const tok = tokens[i];

    // Handle fractions: \frac{num}{den}
    if (tok.type === 'cmd' && tok.val === '\\frac') {
      const numTok = tokens[i+1];
      const denTok = tokens[i+2];
      if (numTok && denTok) {
        const num = getGroupContent(numTok);
        const den = getGroupContent(denTok);
        out += `<m:f><m:num><m:r><m:t>${escXml('')}</m:t></m:r>${parseLatexLine(num)}</m:num>`
             + `<m:den><m:r><m:t>${escXml('')}</m:t></m:r>${parseLatexLine(den)}</m:den></m:f>`;
        i += 3; continue;
      }
    }

    // \tfrac same as \frac
    if (tok.type === 'cmd' && tok.val === '\\tfrac') {
      const numTok = tokens[i+1];
      const denTok = tokens[i+2];
      if (numTok && denTok) {
        const num = getGroupContent(numTok);
        const den = getGroupContent(denTok);
        out += `<m:f><m:fPr><m:type m:val="skw"/></m:fPr><m:num>${parseLatexLine(num)}</m:num>`
             + `<m:den>${parseLatexLine(den)}</m:den></m:f>`;
        i += 3; continue;
      }
    }

    // \dfrac
    if (tok.type === 'cmd' && tok.val === '\\dfrac') {
      const numTok = tokens[i+1];
      const denTok = tokens[i+2];
      if (numTok && denTok) {
        const num = getGroupContent(numTok);
        const den = getGroupContent(denTok);
        out += `<m:f><m:num>${parseLatexLine(num)}</m:num><m:den>${parseLatexLine(den)}</m:den></m:f>`;
        i += 3; continue;
      }
    }

    // \sqrt[n]{x} or \sqrt{x}
    if (tok.type === 'cmd' && tok.val === '\\sqrt') {
      let degContent = null;
      let nextIdx = i + 1;
      // Check for optional [n]
      if (nextIdx < tokens.length && tokens[nextIdx].type === 'char' && tokens[nextIdx].val === '[') {
        // find closing ]
        let j = nextIdx + 1, deg = '';
        while (j < tokens.length && !(tokens[j].type === 'char' && tokens[j].val === ']')) {
          deg += getRawVal(tokens[j]); j++;
        }
        degContent = deg; nextIdx = j + 1;
      }
      const radTok = tokens[nextIdx];
      const radContent = radTok ? getGroupContent(radTok) : '';
      if (degContent) {
        out += `<m:rad><m:radPr><m:degHide m:val="0"/></m:radPr>`
             + `<m:deg>${parseLatexLine(degContent)}</m:deg>`
             + `<m:e>${parseLatexLine(radContent)}</m:e></m:rad>`;
      } else {
        out += `<m:rad><m:radPr><m:degHide m:val="1"/></m:radPr>`
             + `<m:deg/><m:e>${parseLatexLine(radContent)}</m:e></m:rad>`;
      }
      i = nextIdx + 1; continue;
    }

    // \sum, \prod, \int with limits
    if (tok.type === 'cmd' && (tok.val === '\\sum' || tok.val === '\\prod' || tok.val === '\\int' || tok.val === '\\oint')) {
      const nAry = { '\\sum':'∑', '\\prod':'∏', '\\int':'∫', '\\oint':'∮' }[tok.val];
      let subContent = '', supContent = '';
      let j = i + 1;
      while (j < tokens.length) {
        if (tokens[j].type === 'script' && tokens[j].val === '_' && tokens[j+1]) {
          subContent = getGroupContent(tokens[j+1]); j += 2;
        } else if (tokens[j].type === 'script' && tokens[j].val === '^' && tokens[j+1]) {
          supContent = getGroupContent(tokens[j+1]); j += 2;
        } else break;
      }
      const limLoc = tok.val === '\\int' || tok.val === '\\oint' ? 'subSup' : 'undOvr';
      out += `<m:nary><m:naryPr><m:chr m:val="${nAry}"/><m:limLoc m:val="${limLoc}"/>`
           + `<m:subHide m:val="${subContent?'0':'1'}"/><m:supHide m:val="${supContent?'0':'1'}"/></m:naryPr>`
           + `<m:sub>${subContent ? parseLatexLine(subContent) : ''}</m:sub>`
           + `<m:sup>${supContent ? parseLatexLine(supContent) : ''}</m:sup>`
           + `<m:e><m:r><m:t> </m:t></m:r></m:e></m:nary>`;
      i = j; continue;
    }

    // \lim, \max, \min, \log, \ln, \sin, \cos, \tan, \tan^{-1} etc.
    if (tok.type === 'cmd' && /^\\(lim|max|min|log|ln|sin|cos|tan|cot|sec|csc|exp|det|deg|arg|Re|Im)$/.test(tok.val)) {
      const fname = tok.val.slice(1);
      // Check for subscript (e.g. \lim_{x \to 0})
      let subContent = '';
      if (tokens[i+1] && tokens[i+1].type === 'script' && tokens[i+1].val === '_' && tokens[i+2]) {
        subContent = getGroupContent(tokens[i+2]); i += 2;
      }
      if (subContent) {
        out += `<m:func><m:funcPr/><m:fName><m:limLow>`
             + `<m:e><m:r><m:rPr><m:sty m:val="p"/></m:rPr><m:t>${escXml(fname)}</m:t></m:r></m:e>`
             + `<m:lim>${parseLatexLine(subContent)}</m:lim></m:limLow></m:fName>`
             + `<m:e><m:r><m:t> </m:t></m:r></m:e></m:func>`;
      } else {
        out += `<m:func><m:funcPr/><m:fName><m:r><m:rPr><m:sty m:val="p"/></m:rPr><m:t>${escXml(fname)}</m:t></m:r></m:fName>`
             + `<m:e><m:r><m:t> </m:t></m:r></m:e></m:func>`;
      }
      i++; continue;
    }

    // \text{...}
    if (tok.type === 'cmd' && tok.val === '\\text') {
      const grp = tokens[i+1];
      const txt = grp ? getGroupContent(grp) : '';
      out += `<m:r><m:rPr><m:sty m:val="p"/></m:rPr><m:t xml:space="preserve">${escXml(txt)}</m:t></m:r>`;
      i += grp ? 2 : 1; continue;
    }

    // \mathbf, \boldsymbol, \mathit, \mathrm, \mathcal, \mathbb
    if (tok.type === 'cmd' && /^\\(mathbf|boldsymbol|mathit|mathrm|mathcal|mathbb|mathsf|mathtt)$/.test(tok.val)) {
      const sty = { '\\mathbf':'b','\\boldsymbol':'b','\\mathit':'i','\\mathrm':'p','\\mathcal':'b-i','\\mathbb':'b','\\mathsf':'p','\\mathtt':'p' }[tok.val] || 'i';
      const grp = tokens[i+1];
      const content = grp ? getGroupContent(grp) : '';
      out += `<m:r><m:rPr><m:sty m:val="${sty}"/></m:rPr><m:t>${escXml(content)}</m:t></m:r>`;
      i += grp ? 2 : 1; continue;
    }

    // \overline{}, \underline{}, \hat{}, \tilde{}, \bar{}, \vec{}, \dot{}, \ddot{}
    if (tok.type === 'cmd' && /^\\(overline|underline|hat|tilde|bar|vec|dot|ddot|widehat|widetilde)$/.test(tok.val)) {
      const accMap = {
        '\\hat':'̂','\\tilde':'̃','\\bar':'̄','\\vec':'⃗','\\dot':'̇','\\ddot':'̈',
        '\\widehat':'̂','\\widetilde':'̃'
      };
      const grp = tokens[i+1];
      const content = grp ? getGroupContent(grp) : '';
      if (tok.val === '\\overline') {
        out += `<m:bar><m:barPr><m:pos m:val="top"/></m:barPr><m:e>${parseLatexLine(content)}</m:e></m:bar>`;
      } else if (tok.val === '\\underline') {
        out += `<m:bar><m:barPr><m:pos m:val="bot"/></m:barPr><m:e>${parseLatexLine(content)}</m:e></m:bar>`;
      } else if (accMap[tok.val]) {
        out += `<m:acc><m:accPr><m:chr m:val="${accMap[tok.val]}"/></m:accPr><m:e>${parseLatexLine(content)}</m:e></m:acc>`;
      } else {
        out += parseLatexLine(content);
      }
      i += grp ? 2 : 1; continue;
    }

    // \overbrace{} \underbrace{}
    if (tok.type === 'cmd' && (tok.val === '\\overbrace' || tok.val === '\\underbrace')) {
      const grp = tokens[i+1];
      const content = grp ? getGroupContent(grp) : '';
      const pos = tok.val === '\\overbrace' ? 'top' : 'bot';
      out += `<m:groupChr><m:groupChrPr><m:pos m:val="${pos}"/></m:groupChrPr><m:e>${parseLatexLine(content)}</m:e></m:groupChr>`;
      i += grp ? 2 : 1; continue;
    }

    // \underset{sub}{base} \overset{sup}{base}
    if (tok.type === 'cmd' && (tok.val === '\\underset' || tok.val === '\\overset')) {
      const t1 = tokens[i+1], t2 = tokens[i+2];
      const c1 = t1 ? getGroupContent(t1) : '', c2 = t2 ? getGroupContent(t2) : '';
      if (tok.val === '\\underset') {
        out += `<m:limLow><m:e>${parseLatexLine(c2)}</m:e><m:lim>${parseLatexLine(c1)}</m:lim></m:limLow>`;
      } else {
        out += `<m:limUpp><m:e>${parseLatexLine(c2)}</m:e><m:lim>${parseLatexLine(c1)}</m:lim></m:limUpp>`;
      }
      i += (t1 && t2) ? 3 : 1; continue;
    }

    // \left ... \right delimiters
    if (tok.type === 'cmd' && tok.val === '\\left') {
      // collect everything until matching \right
      const delim = tokens[i+1] ? getDelimChar(tokens[i+1]) : '(';
      let j = i + 2, depth2 = 1, inner = [];
      while (j < tokens.length && depth2 > 0) {
        if (tokens[j].type === 'cmd' && tokens[j].val === '\\left') depth2++;
        if (tokens[j].type === 'cmd' && tokens[j].val === '\\right') { depth2--; if (!depth2) break; }
        inner.push(tokens[j]); j++;
      }
      const closeDelim = tokens[j+1] ? getDelimChar(tokens[j+1]) : ')';
      const innerOmml = buildOmml(inner);
      out += `<m:d><m:dPr><m:begChr m:val="${escXml(delim)}"/><m:endChr m:val="${escXml(closeDelim)}"/></m:dPr>`
           + `<m:e>${innerOmml}</m:e></m:d>`;
      i = j + 2; continue;
    }

    // Skip \right (handled by \left)
    if (tok.type === 'cmd' && tok.val === '\\right') { i += 2; continue; }

    // Skip \left. \right. (invisible delimiters)
    if (tok.type === 'cmd' && (tok.val === '\\left.' || tok.val === '\\right.')) { i++; continue; }

    // \underbrace, \overbrace with limits already handled above

    // \to, \rightarrow, \leftarrow etc as operators
    if (tok.type === 'cmd') {
      const symMap = {
        '\\alpha':'α','\\beta':'β','\\gamma':'γ','\\delta':'δ','\\epsilon':'ε',
        '\\varepsilon':'ε','\\zeta':'ζ','\\eta':'η','\\theta':'θ','\\vartheta':'ϑ',
        '\\iota':'ι','\\kappa':'κ','\\lambda':'λ','\\mu':'μ','\\nu':'ν',
        '\\xi':'ξ','\\pi':'π','\\varpi':'ϖ','\\rho':'ρ','\\varrho':'ϱ',
        '\\sigma':'σ','\\varsigma':'ς','\\tau':'τ','\\upsilon':'υ','\\phi':'φ',
        '\\varphi':'φ','\\chi':'χ','\\psi':'ψ','\\omega':'ω',
        '\\Gamma':'Γ','\\Delta':'Δ','\\Theta':'Θ','\\Lambda':'Λ','\\Xi':'Ξ',
        '\\Pi':'Π','\\Sigma':'Σ','\\Upsilon':'Υ','\\Phi':'Φ','\\Psi':'Ψ','\\Omega':'Ω',
        '\\infty':'∞','\\partial':'∂','\\nabla':'∇','\\forall':'∀','\\exists':'∃',
        '\\in':'∈','\\notin':'∉','\\subset':'⊂','\\supset':'⊃','\\cup':'∪','\\cap':'∩',
        '\\leq':'≤','\\geq':'≥','\\neq':'≠','\\approx':'≈','\\equiv':'≡','\\sim':'∼',
        '\\pm':'±','\\mp':'∓','\\times':'×','\\div':'÷','\\cdot':'·','\\circ':'∘',
        '\\Rightarrow':'⇒','\\Leftarrow':'⇐','\\Leftrightarrow':'⇔',
        '\\rightarrow':'→','\\leftarrow':'←','\\to':'→','\\gets':'←',
        '\\uparrow':'↑','\\downarrow':'↓','\\leftrightarrow':'↔',
        '\\angle':'∠','\\perp':'⊥','\\parallel':'∥',
        '\\ldots':'…','\\cdots':'⋯','\\vdots':'⋮','\\ddots':'⋱',
        '\\!':'','\\,':' ','\\;':' ','\\:':' ','\\ ':' ',
        '\\{':'{','\\}':'}','\\|':'‖',
        '\\Vert':'‖','\\vert':'|',
        '\\lfloor':'⌊','\\rfloor':'⌋','\\lceil':'⌈','\\rceil':'⌉',
        '\\langle':'⟨','\\rangle':'⟩',
        '\\Re':'ℜ','\\Im':'ℑ',
        '\\prime':'′',
        '\\quad':' ','\\qquad':'  ',
        '\\mp':'∓',
        '\\ne':'≠','\\le':'≤','\\ge':'≥',
        '\\not':'̸',
      };
      const sym = symMap[tok.val];
      if (sym !== undefined) {
        if (sym) out += `<m:r><m:t>${escXml(sym)}</m:t></m:r>`;
        i++; continue;
      }
      // Unknown command — render as roman text
      out += `<m:r><m:rPr><m:sty m:val="p"/></m:rPr><m:t>${escXml(tok.val.slice(1))}</m:t></m:r>`;
      i++; continue;
    }

    // Superscript ^ and subscript _
    if (tok.type === 'script') {
      const isSuper = tok.val === '^';
      const base = out; out = '';
      // Get the exponent/subscript token
      const scriptTok = tokens[i+1];
      const scriptContent = scriptTok ? getGroupContent(scriptTok) : '';

      // Check if we also have the other script following
      let hasSub = false, hasSup = false, subC = '', supC = '';
      if (isSuper) {
        supC = scriptContent;
        if (tokens[i+2] && tokens[i+2].type === 'script' && tokens[i+2].val === '_' && tokens[i+3]) {
          subC = getGroupContent(tokens[i+3]); hasSub = true;
        }
      } else {
        subC = scriptContent;
        if (tokens[i+2] && tokens[i+2].type === 'script' && tokens[i+2].val === '^' && tokens[i+3]) {
          supC = getGroupContent(tokens[i+3]); hasSup = true;
        }
      }

      // The base is whatever came before in this sequence
      // We wrap base in <m:e>
      if (isSuper && !hasSub) {
        out = `<m:sSup><m:e>${base}</m:e><m:sup>${parseLatexLine(supC)}</m:sup></m:sSup>`;
        i += scriptTok ? 2 : 1;
      } else if (!isSuper && !hasSup) {
        out = `<m:sSub><m:e>${base}</m:e><m:sub>${parseLatexLine(subC)}</m:sub></m:sSub>`;
        i += scriptTok ? 2 : 1;
      } else {
        // Both sub and sup
        const finalSub = isSuper ? subC : subC;
        const finalSup = isSuper ? supC : supC;
        out = `<m:sSubSup><m:e>${base}</m:e><m:sub>${parseLatexLine(finalSub)}</m:sub><m:sup>${parseLatexLine(finalSup)}</m:sup></m:sSubSup>`;
        i += hasSub || hasSup ? 4 : 2;
      }
      continue;
    }

    // Braced group — recurse
    if (tok.type === 'group') {
      out += parseLatexLine(tok.val);
      i++; continue;
    }

    // Plain character
    if (tok.type === 'char') {
      const ch = tok.val;
      // Operators
      if (/[+\-=<>\/!]/.test(ch)) {
        out += `<m:r><m:t xml:space="preserve"> ${escXml(ch)} </m:t></m:r>`;
      } else if (ch === ',') {
        out += `<m:r><m:t xml:space="preserve">, </m:t></m:r>`;
      } else if (ch === '.') {
        out += `<m:r><m:t>.</m:t></m:r>`;
      } else if (/[0-9]/.test(ch)) {
        // Collect consecutive digits
        let num = ch; let j2 = i + 1;
        while (j2 < tokens.length && tokens[j2].type === 'char' && /[0-9.]/.test(tokens[j2].val)) {
          num += tokens[j2].val; j2++;
        }
        out += `<m:r><m:t>${escXml(num)}</m:t></m:r>`;
        i = j2; continue;
      } else if (ch === '(' || ch === ')' || ch === '[' || ch === ']' || ch === '|') {
        out += `<m:r><m:t>${escXml(ch)}</m:t></m:r>`;
      } else {
        // letter — italic by default for math
        out += `<m:r><m:t>${escXml(ch)}</m:t></m:r>`;
      }
      i++; continue;
    }

    i++;
  }
  return out;
}

function getGroupContent(tok) {
  if (!tok) return '';
  if (tok.type === 'group') return tok.val;
  if (tok.type === 'char') return tok.val;
  if (tok.type === 'cmd') return tok.val;
  return getRawVal(tok);
}

function getRawVal(tok) {
  if (tok.type === 'group') return tok.val;
  if (tok.type === 'cmd') return tok.val;
  if (tok.type === 'char') return tok.val;
  return '';
}

function getDelimChar(tok) {
  if (!tok) return '(';
  if (tok.type === 'char') return tok.val;
  if (tok.type === 'cmd') {
    const m = {
      '\\{':'{','\\}':'}','\\|':'|','\\lvert':'|','\\rvert':'|',
      '\\lfloor':'⌊','\\rfloor':'⌋','\\lceil':'⌈','\\rceil':'⌉',
      '\\langle':'⟨','\\rangle':'⟩','\\vert':'|','\\Vert':'‖',
      '.':''
    };
    return m[tok.val] || tok.val.replace('\\','');
  }
  return '(';
}

// ── DOCX export ───────────────────────────────────────────────────────────────
async function exportDOCX() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) { setStatus('Nothing to export — paste your reply first.'); return; }

  setStatus('Building .docx with native editable equations…');

  try { await ensureJSZip(); }
  catch(e) { setStatus('Failed to load JSZip. Check your internet connection.'); return; }

  const title = document.getElementById('docTitle').value || 'Document';
  const tokens = tokenize(preprocessInput(raw));

  const SEC_HEX = {
    question:'185FA5', given:'0F6E56', formula:'854F0B',
    solution:'534AB7', 'final answer':'A32D2D', answer:'A32D2D',
    note:'884488', default:'5F5E5A'
  };
  function getSecHex(name) {
    const k = name.toLowerCase();
    for (const key in SEC_HEX) if (k.includes(key)) return SEC_HEX[key];
    return SEC_HEX.default;
  }
  function stripHTML(html) { const d=document.createElement('div'); d.innerHTML=html; return d.textContent||''; }
  function wx(s) { return escXml(s); }

  // Inline text with possible inline math runs
  function buildInlineRuns(html) {
    // Parse inline \(...\) math inside text
    let result = '';
    const parts = html.split(/(\\\([\s\S]*?\\\))/g);
    for (const part of parts) {
      const mInline = part.match(/^\\\(([\s\S]*?)\\\)$/);
      if (mInline) {
        // Inline equation
        const omml = latexToOmml(mInline[1]);
        result += omml;
      } else {
        // Plain text
        const txt = stripHTML(part);
        if (txt) result += `<m:r><m:rPr><m:sty m:val="p"/></m:rPr><m:t xml:space="preserve">${wx(txt)}</m:t></m:r>`;
      }
    }
    return result;
  }

  const ns = [
    'xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"',
    'xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"',
    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"',
    'xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"',
    'xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"',
    'xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"',
    'mc:Ignorable="w14"'
  ].join(' ');

  let body = '';

  // Title paragraph
  if (title) {
    body += `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:after="320"/></w:pPr>`
          + `<w:r><w:rPr><w:b/><w:sz w:val="36"/><w:szCs w:val="36"/>`
          + `<w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/></w:rPr>`
          + `<w:t>${wx(title)}</w:t></w:r></w:p>`;
  }

  for (const tok of tokens) {
    if (tok.type === 'hr') {
      body += `<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="CCCCCC"/></w:pBdr>`
            + `<w:spacing w:before="160" w:after="160"/></w:pPr></w:p>`;

    } else if (tok.type === 'section') {
      const hex = getSecHex(tok.text);
      body += `<w:p><w:pPr>`
            + `<w:pBdr><w:left w:val="single" w:sz="12" w:space="8" w:color="${hex}"/></w:pBdr>`
            + `<w:ind w:left="140"/><w:spacing w:before="280" w:after="100"/></w:pPr>`
            + `<w:r><w:rPr><w:b/><w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="${hex}"/>`
            + `<w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/></w:rPr>`
            + `<w:t>${wx(tok.text.toUpperCase())}</w:t></w:r></w:p>`;

    } else if (tok.type === 'eq') {
      // Native OMML display equation — fully editable in Word
      const omml = latexToOmml(tok.latex);
      body += `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="140" w:after="140"/></w:pPr>`
            + `<m:oMathPara xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math">`
            + `<m:oMathParaPr><m:jc m:val="center"/></m:oMathParaPr>`
            + omml
            + `</m:oMathPara></w:p>`;

    } else if (tok.type === 'text') {
      // Check if this text has inline math
      const hasInlineMath = tok.html.includes('\\(');
      if (hasInlineMath) {
        // Mixed text+math paragraph
        body += `<w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr>`;
        const parts = tok.html.split(/(\\\([\s\S]*?\\\))/g);
        for (const part of parts) {
          const mInline = part.match(/^\\\(([\s\S]*?)\\\)$/);
          if (mInline) {
            const omml = latexToOmml(mInline[1]);
            body += omml;
          } else {
            const txt = stripHTML(part);
            if (txt.trim()) {
              body += `<w:r><w:rPr><w:sz w:val="24"/><w:szCs w:val="24"/>`
                    + `<w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/></w:rPr>`
                    + `<w:t xml:space="preserve">${wx(txt)}</w:t></w:r>`;
            }
          }
        }
        body += `</w:p>`;
      } else {
        const plain = stripHTML(tok.html);
        if (plain.trim()) {
          body += `<w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr>`
                + `<w:r><w:rPr><w:sz w:val="24"/><w:szCs w:val="24"/>`
                + `<w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/></w:rPr>`
                + `<w:t xml:space="preserve">${wx(plain)}</w:t></w:r></w:p>`;
        }
      }
    }
  }

  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`
    + `<w:document ${ns}><w:body>${body}`
    + `<w:sectPr><w:pgSz w:w="12240" w:h="15840"/>`
    + `<w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="708" w:footer="708" w:gutter="0"/>`
    + `</w:sectPr></w:body></w:document>`;

  const wordRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`
    + `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">`
    + `<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`
    + `<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/>`
    + `</Relationships>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
  <Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>
</Types>`;

  const relsMain = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const styles = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
          xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math">
  <w:docDefaults><w:rPrDefault><w:rPr>
    <w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/>
    <w:sz w:val="24"/><w:szCs w:val="24"/>
  </w:rPr></w:rPrDefault><w:pPrDefault><w:pPr>
    <w:spacing w:after="160" w:line="276" w:lineRule="auto"/>
  </w:pPr></w:pPrDefault></w:docDefaults>
  <w:style w:type="paragraph" w:default="1" w:styleId="Normal">
    <w:name w:val="Normal"/><w:qFormat/>
  </w:style>
</w:styles>`;

  const settings = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:compat><w:compatSetting w:name="compatibilityMode" w:uri="http://schemas.microsoft.com/office/word" w:val="15"/></w:compat>
</w:settings>`;

  const zip = new JSZip();
  zip.file('[Content_Types].xml', contentTypes);
  zip.file('_rels/.rels', relsMain);
  zip.file('word/document.xml', documentXml);
  zip.file('word/_rels/document.xml.rels', wordRels);
  zip.file('word/styles.xml', styles);
  zip.file('word/settings.xml', settings);

  const blob = await zip.generateAsync({
    type:'blob',
    mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    compression:'DEFLATE', compressionOptions:{level:6}
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  const fname = title.replace(/\s+/g,'_').replace(/[^\w-]/g,'') || 'document';
  a.download = fname + '.docx';
  a.click();
  URL.revokeObjectURL(url);
  setStatus(`✓ Downloaded ${fname}.docx — all equations are native Word math (fully editable)!`);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') renderPreview();
});
</script>
</body>
</html>
